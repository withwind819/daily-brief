name: daily-brief

on:
  schedule:
    - cron: "0 23 * * *"      # UTC 23:00 = 北京时间次日 07:00
  workflow_dispatch:           # 支持手动触发
  push:
    branches: [ main ]         # 推代码后也跑一次，便于首次部署

permissions:
  contents: write              # 允许把 news.db 和 data/ 提交回仓库
  pages: write                 # 部署 GitHub Pages
  id-token: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: 抓取并导出
        run: |
          python backend/fetch.py
          python backend/export_static.py

      - name: 提交数据回仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/news.db frontend/data
          git commit -m "chore: update news $(date -u +%Y-%m-%d)" || echo "无变化，跳过提交"
          git push || echo "推送失败或无变化"

      - name: 上传 Pages 内容（仅 frontend 目录）
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
